name: Deploy NC Explorer to GitHub Pages

# Publishes the static site in docs/ to GitHub Pages on every push to main.
# Set Settings -> Pages -> Build and deployment -> Source = "GitHub Actions",
# and make this the ONLY Pages workflow (delete any other one that deploys to
# Pages). If Source is "Deploy from a branch", GitHub runs its OWN
# pages-build-deployment in parallel and you get two github-pages artifacts.

on:
  push:
    branches: [main]
  workflow_dispatch:        # lets you run it manually from the Actions tab

permissions:
  contents: read
  pages: write
  id-token: write

# serialize deployments: never run two at once (this is what avoids the
# transient "Deployment failed, try again later" from racing deploys), but
# don't cancel one that's already publishing
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # BUILD packages docs/ into the github-pages artifact. It is kept SEPARATE from
  # deploy on purpose: if the deploy step fails transiently and you click
  # "Re-run failed jobs", only `deploy` re-runs — build does NOT run again, so a
  # second github-pages artifact is never uploaded. (Uploading twice under one
  # run is what triggers: "Multiple artifacts named github-pages were
  # unexpectedly found ... Artifact count is 2".)
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Upload docs/ as the Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to Pages
        id: deployment
        uses: actions/deploy-pages@v4
