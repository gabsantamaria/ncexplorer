name: Deploy NC Explorer to GitHub Pages

# Publishes the static site in docs/ to GitHub Pages on every push to main.
# Set Settings -> Pages -> Source = "GitHub Actions" and make this the ONLY
# Pages workflow (delete any other one that deploys to Pages).

on:
  push:
    branches: [main]
  workflow_dispatch:        # lets you run it manually from the Actions tab

permissions:
  contents: read
  pages: write
  id-token: write

# serialize deployments: never run two at once (this is what avoids the
# transient "Deployment failed, try again later" from racing deploys), but
# don't cancel one that's already publishing
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Upload docs/ as the Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs
      - name: Deploy to Pages
        id: deployment
        uses: actions/deploy-pages@v4
